<!DOCTYPE html> <!-- HTML5 문서 선언 -->
<html lang="ko"> <!-- 문서 언어를 한국어로 설정 -->

<head>
    <meta charset="UTF-8"> <!-- 한글 깨짐 방지 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 모바일 화면에서 크기 맞추기 -->

    <title>Document</title> <!-- 브라우저 탭 제목 -->
</head>

<body>

    <!-- span : 의미 없는 인라인 태그 (스타일 적용용) -->
    <span>Lorem ipsum dolor sit.</span>

    <!-- strong : 중요한 텍스트 (기본적으로 굵게 표시됨) -->
    <!-- 의미적으로 "중요하다" 라는 뜻 -->
    <strong>Lorem ipsum dolor sit.</strong>

    <!-- b : 단순히 글씨를 굵게 표시 -->
    <!-- 의미는 없음 (디자인용) -->
    <b>Lorem ipsum dolor sit.</b>

    <!-- em : 강조 텍스트 -->
    <!-- 기본적으로 기울임 표시 -->
    <em>Lorem ipsum dolor sit.</em>

    <!-- i : 단순 기울임 -->
    <!-- 의미 없음 (디자인용) -->
    <i>Lorem ipsum dolor sit.</i>

    <!-- a : 링크 태그 -->
    <!-- href에 이동할 주소를 넣음 -->
    <a href="">Lorem ipsum dolor sit.</a>

</body>

</html>
